version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    command: gunicorn lims.config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120
    volumes:
      - ../:/app
      - staticfiles:/app/staticfiles
      - media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DJANGO_DEBUG=true
      - DJANGO_SECRET_KEY=dev-secret-key-change-me
      - DATABASE_URL=postgresql://lims:lims@db:5432/lims
      - REDIS_URL=redis://redis:6379/0
      - LIMS_SITE_CODE=DEFAULT
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - lims-network

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: celery -A lims.celery_app worker -l INFO --concurrency=4
    volumes:
      - ../:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DJANGO_DEBUG=true
      - DJANGO_SECRET_KEY=dev-secret-key-change-me
      - DATABASE_URL=postgresql://lims:lims@db:5432/lims
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - lims-network

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: celery -A lims.celery_app beat -l INFO
    volumes:
      - ../:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://lims:lims@db:5432/lims
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - lims-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=lims
      - POSTGRES_PASSWORD=lims
      - POSTGRES_DB=lims
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lims"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lims-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - lims-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - lims-network

  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: celery -A lims.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - lims-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - web
    networks:
      - lims-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles:/staticfiles:ro
      - media:/media:ro
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - lims-network

volumes:
  postgres-data:
  redis-data:
  minio-data:
  staticfiles:
  media:

networks:
  lims-network:
    driver: bridge
